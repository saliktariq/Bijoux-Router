# =============================================================================
# Bijoux Quota-Aware LLM Gateway — All Providers Configuration
# =============================================================================
#
# This configuration file includes EVERY provider from the supported list.
# Enable/disable individual providers by setting  enabled: true/false.
#
# Secrets: Use ${ENV_VAR} syntax — resolved from the process environment at
# load time.  NEVER hard-code secrets in this file.
#
# Provider types:
#   anthropic         — Anthropic Claude (Messages API)
#   cloudflare        — Cloudflare Workers AI (native API)
#   cohere            — Cohere Chat v2 API
#   gemini            — Google Generative AI (Gemini)
#   huggingface       — Hugging Face Inference (TGI / chat)
#   openai_compatible — Any OpenAI-compatible /v1/chat/completions endpoint
#   openrouter        — OpenRouter (extends openai_compatible with extra headers)
#   mock              — Test/mock provider
#
# Most providers expose an OpenAI-compatible endpoint and work with
# provider_type: openai_compatible — just set the correct base_url.
# =============================================================================

selection_strategy:
  strategy_type: priority_quota
  fairness_cursor: true

default_timeout_seconds: 60
max_failover_attempts: 10
storage_path: bijoux_state.db
log_level: INFO
redact_secrets: true

providers:

  # ═══════════════════════════════════════════════════════════════════════════
  # 1. OpenRouter  (aggregator — auto-selects free models)
  #    Hard limit: 50 requests/day across all free models.
  #    OpenRouter automatically routes to available free models.
  # ═══════════════════════════════════════════════════════════════════════════
  - name: openrouter
    enabled: true
    provider_type: openrouter
    base_url: https://openrouter.ai/api/v1
    api_key: "${OPENROUTER_API_KEY}"
    default_model: ""              # leave empty — OpenRouter auto-selects free models
    priority: 3
    timeout_seconds: 90
    retry_policy: { max_retries: 2, backoff_base: 1.0, backoff_max: 10.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 120, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 600 }
    quota:
      token_limit: 100000000       # effectively unlimited (RPD is the binding constraint)
      period_type: day
      period_value: 1
      reset_mode: fixed
      request_limit: 50            # hard daily cap
    headers:
      HTTP-Referer: https://github.com/bijoux-router
      X-Title: Bijoux Router
    tags: [aggregator, openrouter, free-tier]
    failover_enabled: true

  # ═══════════════════════════════════════════════════════════════════════════
  # 2. Google AI Studio (Gemini) — one entry per model with free quota
  #    All share the same API key; each has independent quota tracking.
  #    Priority: higher-throughput models get lower priority numbers (tried first).
  # ═══════════════════════════════════════════════════════════════════════════

  # ── Gemini 3.1 Flash Lite ─── RPM:15  TPM:250K  RPD:500 ──────────────
  # Best daily throughput of all Gemini models (500 RPD)
  - name: gemini-3.1-flash-lite
    enabled: true
    provider_type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: "${GEMINI_API_KEY}"
    default_model: gemini-3.1-flash-lite
    priority: 1
    timeout_seconds: 60
    retry_policy: { max_retries: 2, backoff_base: 1.5, backoff_max: 15.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 120, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 600 }
    quota:
      token_limit: 5000000       # daily soft cap (TPM enforced server-side at 250K/min)
      period_type: day
      period_value: 1
      reset_mode: fixed
      request_limit: 500         # RPD
    tags: [free-tier, gemini, google, flash-lite]
    failover_enabled: true

  # ── Gemini 2.5 Flash ─── RPM:5  TPM:250K  RPD:20 ────────────────────
  # Smartest free Flash model — low RPD but high quality
  - name: gemini-2.5-flash
    enabled: true
    provider_type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: "${GEMINI_API_KEY}"
    default_model: gemini-2.5-flash
    priority: 2
    timeout_seconds: 90
    retry_policy: { max_retries: 2, backoff_base: 1.5, backoff_max: 15.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 120, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 600 }
    quota:
      token_limit: 5000000       # daily soft cap (TPM enforced server-side at 250K/min)
      period_type: day
      period_value: 1
      reset_mode: fixed
      request_limit: 20          # RPD
    tags: [free-tier, gemini, google, flash]
    failover_enabled: true

  # ── Gemini 3 Flash ─── RPM:5  TPM:250K  RPD:20 ──────────────────────
  - name: gemini-3-flash
    enabled: true
    provider_type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: "${GEMINI_API_KEY}"
    default_model: gemini-3.0-flash
    priority: 2
    timeout_seconds: 60
    retry_policy: { max_retries: 2, backoff_base: 1.5, backoff_max: 15.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 120, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 600 }
    quota:
      token_limit: 5000000
      period_type: day
      period_value: 1
      reset_mode: fixed
      request_limit: 20          # RPD
    tags: [free-tier, gemini, google, flash]
    failover_enabled: true

  # ── Gemini 2.5 Flash Lite ─── RPM:10  TPM:250K  RPD:20 ──────────────
  - name: gemini-2.5-flash-lite
