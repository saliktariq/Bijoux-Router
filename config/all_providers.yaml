    priority: 3
    timeout_seconds: 60
    retry_policy: { max_retries: 2, backoff_base: 1.5, backoff_max: 15.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 120, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 600 }
    quota:
      token_limit: 5000000
      period_type: day
      period_value: 1
      reset_mode: fixed
      request_limit: 20          # RPD
    tags: [free-tier, gemini, google, flash-lite]
    failover_enabled: true

  # ── Gemma 3 27B ─── RPM:30  TPM:15K  RPD:14,400 ─────────────────────
  # Best quality open Gemma model — huge RPD, small TPM window
  - name: gemma-3-27b
    enabled: true
    provider_type: gemini
    base_url: https://generativelanguage.googleapis.com/v1beta
    api_key: "${GEMINI_API_KEY}"
    default_model: gemma-3-27b-it
    priority: 4
    timeout_seconds: 60
    retry_policy: { max_retries: 2, backoff_base: 1.0, backoff_max: 10.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 60, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 300 }
    quota:
      token_limit: 15000         # TPM — per-minute enforcement
      period_type: minute
      period_value: 1
      reset_mode: fixed
      request_limit: 30          # RPM
    tags: [free-tier, gemini, google, gemma, open-source]
    failover_enabled: true

  # ── Gemma 3 12B ─── RPM:30  TPM:15K  RPD:14,400 ─────────────────────
  - name: gemma-3-12b
