    retry_policy: { max_retries: 2, backoff_base: 1.0, backoff_max: 10.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 60, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 300 }
    quota: { token_limit: 300000, period_type: day, period_value: 1, reset_mode: fixed }
    tags: [anthropic, claude]
    failover_enabled: true

  # ═══════════════════════════════════════════════════════════════════════════
  # 4. Cohere  (100 RPM generate, no known daily cap)
  # ═══════════════════════════════════════════════════════════════════════════
  - name: cohere
    enabled: true
    provider_type: cohere
    base_url: https://api.cohere.com
    api_key: "${COHERE_API_KEY}"
    default_model: command-r-plus
    model_map:
      cohere-r: command-r
