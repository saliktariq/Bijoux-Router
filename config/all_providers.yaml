    cooldown_policy: { cooldown_seconds: 60, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 300 }
    quota: { token_limit: 500000, period_type: day, period_value: 1, reset_mode: fixed, request_limit: 14400 }
    tags: [groq, fast-inference]
    failover_enabled: true

