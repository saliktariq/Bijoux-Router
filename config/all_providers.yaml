    retry_policy: { max_retries: 2, backoff_base: 1.0, backoff_max: 10.0, retry_on_transient: true }
    cooldown_policy: { cooldown_seconds: 60, failure_threshold: 3, quota_exhaustion_cooldown_seconds: 300 }
    quota:
      token_limit: 15000
      period_type: minute
      period_value: 1
      reset_mode: fixed
      request_limit: 30
    tags: [free-tier, gemini, google, gemma, open-source]
    failover_enabled: true

  # ── Gemma 3 4B ─── RPM:30  TPM:15K  RPD:14,400 ──────────────────────
  - name: gemma-3-4b
    enabled: true
    provider_type: gemini
